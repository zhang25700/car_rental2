server:
  port: 8080

spring:
  application:
    name: car-rental
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/car_rental2?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.example.carrental.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

jwt:
  issuer: car-rental-system
  secret: change-this-to-a-very-long-secret-key-for-jwt-signing
  access-token-expire-minutes: 30
  refresh-token-expire-days: 7
  refresh-threshold-minutes: 10

cache:
  banner-ttl-minutes: 30
  hot-vehicle-ttl-minutes: 20
  null-ttl-minutes: 5
  ttl-random-bound-minutes: 10

logging:
  level:
    com.example.carrental: info
